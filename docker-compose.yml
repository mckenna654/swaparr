services:
  swaparr:
    image: ghcr.io/mckenna654/swaparr:latest
    build: .
    container_name: swaparr
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - NGINX_PORT=${PORT:-8080}
      - DISPATCHARR_URL=http://192.168.1.100:9191
      - DISPATCHARR_API_KEY=your_api_key_here
    restart: unless-stopped
